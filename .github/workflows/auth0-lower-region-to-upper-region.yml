# =============================================================================
# GitHub Actions Workflow: Auth0 Promote Lower Region → Upper Region
# WITH AuthGuardian AI Review Layer
# =============================================================================
# This workflow integrates an AI-assisted governance and security review layer
# between the Auth0 export and import steps.
#
# Pipeline flow:
#   1. Export Auth0 config from Lower Region → auth0/exported/
#   2. AuthGuardian AI reviews exported config + code for security risks
#   3. Import Auth0 config into Upper Region (scripts/promote-auth0.sh)
#
# The review layer:
#   - Analyzes exported Auth0 configuration files
#   - Reviews Auth0 Actions/Rules/Hooks code for security issues
#   - Generates deployment-review.md and ai-review-report.md
#   - Posts PR comments with findings
#   - Writes GitHub Actions job summary
#   - Does NOT modify or interfere with the deployment step
#
# Required GitHub Secrets:
#   LOWER_REGION_AUTH0_DOMAIN          - Lower Region tenant domain
#   LOWER_REGION_AUTH0_CLIENT_ID       - Lower Region M2M app Client ID
#   LOWER_REGION_AUTH0_CLIENT_SECRET   - Lower Region M2M app Client Secret
#   UPPER_REGION_AUTH0_DOMAIN          - Upper Region tenant domain
#   UPPER_REGION_AUTH0_CLIENT_ID       - Upper Region M2M app Client ID
#   UPPER_REGION_AUTH0_CLIENT_SECRET   - Upper Region M2M app Client Secret
# =============================================================================

name: Auth0 Promote Lower Region → Upper Region

on:
  push:
    branches:
      - main
    paths:
      - "auth0/**"
      - "scripts/**"
      - ".github/workflows/**"
      - "review-engine/**"
  pull_request:
    branches:
      - main
    paths:
      - "auth0/**"
      - "scripts/**"
      - "review-engine/**"
  workflow_dispatch:
    inputs:
      skip_review:
        description: "Skip AuthGuardian AI review"
        type: boolean
        default: false
      block_on_critical:
        description: "Block deployment on CRITICAL findings"
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  NODE_VERSION: "22"
  DEPLOY_CLI_VERSION: "latest"

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Single Job: Export → AuthGuardian Review → Import
  # ═══════════════════════════════════════════════════════════════════════════
  promote:
    name: "🚀 Auth0 Promote (with AuthGuardian Review)"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ─────────────────────────────────────────────────────────
      # Setup
      # ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Auth0 Deploy CLI
        run: |
          npm install -g auth0-deploy-cli@${{ env.DEPLOY_CLI_VERSION }}
          a0deploy --version

      - name: Validate required files
        run: |
          echo "::group::Checking required files"
          REQUIRED_FILES=(
            "scripts/promote-auth0.sh"
          )
          MISSING=0
          for f in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              MISSING=1
            else
              echo "✓ Found: $f"
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            exit 1
          fi
          echo "::endgroup::"

      - name: Make scripts executable
        run: chmod +x scripts/promote-auth0.sh

      # ─────────────────────────────────────────────────────────
      # Step 1: Export Auth0 config from Lower Region
      # (Only export — stops before import)
      # ─────────────────────────────────────────────────────────
      - name: "📤 Export Auth0 config from Lower Region"
        env:
          LOWER_REGION_AUTH0_DOMAIN: ${{ secrets.LOWER_REGION_AUTH0_DOMAIN }}
          LOWER_REGION_AUTH0_CLIENT_ID: ${{ secrets.LOWER_REGION_AUTH0_CLIENT_ID }}
          LOWER_REGION_AUTH0_CLIENT_SECRET: ${{ secrets.LOWER_REGION_AUTH0_CLIENT_SECRET }}
        run: |
          echo "▶ Exporting Auth0 config from Lower Region..."
          EXPORT_DIR="auth0/exported"
          rm -rf "${EXPORT_DIR}"
          mkdir -p "${EXPORT_DIR}"

          CONFIG_FILE=$(mktemp /tmp/auth0-export-config.XXXXXX.json)
          cat > "${CONFIG_FILE}" <<EOF
          {
            "AUTH0_DOMAIN": "${LOWER_REGION_AUTH0_DOMAIN}",
            "AUTH0_CLIENT_ID": "${LOWER_REGION_AUTH0_CLIENT_ID}",
            "AUTH0_CLIENT_SECRET": "${LOWER_REGION_AUTH0_CLIENT_SECRET}",
            "AUTH0_EXCLUDED": [
              "guardianFactors",
              "guardianFactorProviders",
              "guardianFactorTemplates",
              "guardianPhoneFactorMessageTypes",
              "guardianPhoneFactorSelectedProvider",
              "guardianPolicies",
              "logStreams",
              "attackProtection",
              "organizations"
            ]
          }
          EOF

          a0deploy export \
            --format yaml \
            --output_folder "${EXPORT_DIR}" \
            --config_file "${CONFIG_FILE}"

          rm -f "${CONFIG_FILE}"

          if [ ! -f "${EXPORT_DIR}/tenant.yaml" ]; then
            echo "::error::Export failed — tenant.yaml not found"
            exit 1
          fi

          echo "✓ Export completed. Files exported:"
          find "${EXPORT_DIR}" -type f | head -50

      # ─────────────────────────────────────────────────────────
      # Step 2: AuthGuardian AI Review (reviews exported files)
      # ─────────────────────────────────────────────────────────
      - name: Install AuthGuardian AI dependencies
        if: ${{ github.event.inputs.skip_review != 'true' }}
        working-directory: review-engine
        run: npm ci --production 2>/dev/null || npm install --production

      - name: "🛡️ AuthGuardian AI Review"
        id: review
        if: ${{ github.event.inputs.skip_review != 'true' }}
        working-directory: review-engine
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTHGUARDIAN_SCAN_DIR: ${{ github.workspace }}
          AUTHGUARDIAN_PR_NUMBER: ${{ github.event.pull_request.number }}
          AUTHGUARDIAN_BLOCK_ON_CRITICAL: ${{ github.event.inputs.block_on_critical || 'false' }}
          AUTHGUARDIAN_MODE: all
        run: node src/index.js

      - name: Upload AuthGuardian AI Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: authguardian-reports
          path: review-engine/reports/
          retention-days: 30
          if-no-files-found: warn

      # ─────────────────────────────────────────────────────────
      # Step 3: Full Promotion (Export + Import via promote-auth0.sh)
      # Only runs on push to main (not on PRs)
      # ─────────────────────────────────────────────────────────
      - name: "🚀 Promote Auth0 config (Lower Region → Upper Region)"
        if: github.event_name != 'pull_request'
        env:
          LOWER_REGION_AUTH0_DOMAIN: ${{ secrets.LOWER_REGION_AUTH0_DOMAIN }}
          LOWER_REGION_AUTH0_CLIENT_ID: ${{ secrets.LOWER_REGION_AUTH0_CLIENT_ID }}
          LOWER_REGION_AUTH0_CLIENT_SECRET: ${{ secrets.LOWER_REGION_AUTH0_CLIENT_SECRET }}
          UPPER_REGION_AUTH0_DOMAIN: ${{ secrets.UPPER_REGION_AUTH0_DOMAIN }}
          UPPER_REGION_AUTH0_CLIENT_ID: ${{ secrets.UPPER_REGION_AUTH0_CLIENT_ID }}
          UPPER_REGION_AUTH0_CLIENT_SECRET: ${{ secrets.UPPER_REGION_AUTH0_CLIENT_SECRET }}
        run: ./scripts/promote-auth0.sh

      # ─────────────────────────────────────────────────────────
      # Artifacts
      # ─────────────────────────────────────────────────────────
      - name: Upload exported config artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth0-exported-config
          path: auth0/exported/
          retention-days: 14
