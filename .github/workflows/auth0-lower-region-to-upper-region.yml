# =============================================================================
# GitHub Actions Workflow: Promote Auth0 Config from Lower Region → Upper Region
# =============================================================================
# Exports configuration from the Lower Region tenant using Auth0 Deploy CLI,
# then imports it into the Upper Region tenant.
#
# Required GitHub Secrets:
#   LOWER_REGION_AUTH0_DOMAIN          - e.g. my-lower-region.us.auth0.com
#   LOWER_REGION_AUTH0_CLIENT_ID       - Machine-to-Machine app Client ID (Lower Region)
#   LOWER_REGION_AUTH0_CLIENT_SECRET   - Machine-to-Machine app Client Secret (Lower Region)
#   UPPER_REGION_AUTH0_DOMAIN              - e.g. my-upper-region.us.auth0.com
#   UPPER_REGION_AUTH0_CLIENT_ID           - Machine-to-Machine app Client ID (Upper Region)
#   UPPER_REGION_AUTH0_CLIENT_SECRET       - Machine-to-Machine app Client Secret (Upper Region)
# =============================================================================

name: Auth0 Promote Lower Region → Upper Region

on:
  push:
    branches:
      - main
    paths:
      - "auth0/**"
      - "scripts/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  DEPLOY_CLI_VERSION: "latest"   # Use latest to avoid paginate API issues in v7

jobs:
  promote:
    name: Export Lower Region → Import Upper Region
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout repository
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Setup Node.js
      # -----------------------------------------------------------------------
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # -----------------------------------------------------------------------
      # 3. Install Auth0 Deploy CLI
      # -----------------------------------------------------------------------
      - name: Install Auth0 Deploy CLI
        run: |
          npm install -g auth0-deploy-cli@${{ env.DEPLOY_CLI_VERSION }}
          a0deploy --version

      # -----------------------------------------------------------------------
      # 4. Validate required files exist
      # -----------------------------------------------------------------------
      - name: Validate required files
        run: |
          echo "::group::Checking required files"
          REQUIRED_FILES=(
            "scripts/promote-auth0.sh"
          )
          MISSING=0
          for f in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              MISSING=1
            else
              echo "✓ Found: $f"
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            exit 1
          fi
          echo "::endgroup::"

      # -----------------------------------------------------------------------
      # 5. Make scripts executable
      # -----------------------------------------------------------------------
      - name: Make scripts executable
        run: chmod +x scripts/promote-auth0.sh

      # -----------------------------------------------------------------------
      # 6. Run promotion (Export Lower Region → Import Upper Region)
      # -----------------------------------------------------------------------
      - name: Promote Auth0 config (Lower Region → Upper Region)
        env:
          LOWER_REGION_AUTH0_DOMAIN: ${{ secrets.LOWER_REGION_AUTH0_DOMAIN }}
          LOWER_REGION_AUTH0_CLIENT_ID: ${{ secrets.LOWER_REGION_AUTH0_CLIENT_ID }}
          LOWER_REGION_AUTH0_CLIENT_SECRET: ${{ secrets.LOWER_REGION_AUTH0_CLIENT_SECRET }}
          UPPER_REGION_AUTH0_DOMAIN: ${{ secrets.UPPER_REGION_AUTH0_DOMAIN }}
          UPPER_REGION_AUTH0_CLIENT_ID: ${{ secrets.UPPER_REGION_AUTH0_CLIENT_ID }}
          UPPER_REGION_AUTH0_CLIENT_SECRET: ${{ secrets.UPPER_REGION_AUTH0_CLIENT_SECRET }}
        run: ./scripts/promote-auth0.sh

      # -----------------------------------------------------------------------
      # 7. Upload exported config as artifact (for audit/debugging)
      # -----------------------------------------------------------------------
      - name: Upload exported config artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth0-exported-config
          path: auth0/exported/
          retention-days: 14
